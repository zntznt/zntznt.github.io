<!DOCTYPE html>
<!--What you see here is derived from http://katydecorah.com/hey-guys/, which source I downloaded and then modified to suit my own needs-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="x-ua-compatible" content="ie=edge">
<title>I LIKE STUFF</title>
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="description" content="A list of things I like">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
<style>
html,
body,
.flex {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
}
body {
  background: #020516;
  color: #E4A71E;
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-weight: 700;
  font-size: clamp(1rem, 5vw, 3em);
  -webkit-font-smoothing : none;
  cursor: pointer;
}
.flex {
  word-wrap: break-word;
  overflow-wrap: break-word;
  box-sizing: border-box;
  padding: 5vw;
  display: -webkit-box;
  display: -webkit-flex;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
      -ms-flex-pack: center;
          justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
      -ms-flex-align: center;
          align-items: center;
}
::selection {
  background: darkorange;
}

.nav-link {
  position: fixed;
  bottom: 1.2rem;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.6rem;
  color: rgba(228, 167, 30, 0.5);
  text-decoration: none;
  text-shadow: 0 0 6px rgba(228, 167, 30, 0.3);
  transition: color 0.3s ease, text-shadow 0.3s ease;
  z-index: 100;
  -webkit-font-smoothing: none;
}

.nav-link:hover {
  color: #E4A71E;
  text-shadow: 0 0 12px rgba(228, 167, 30, 0.6);
}

.nav-link.left {
  left: 1.2rem;
}

.nav-link.right {
  right: 1.2rem;
}

#hint {
  position: fixed;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace;
  font-size: 0.5rem;
  color: rgba(228, 167, 30, 0.4);
  text-shadow: 0 0 6px rgba(228, 167, 30, 0.25);
  animation: pulse 2s ease-in-out infinite;
  pointer-events: none;
  z-index: 99;
  -webkit-font-smoothing: none;
  transition: opacity 0.8s ease;
}
#hint.hidden {
  opacity: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

@media (max-width: 640px) {
  .nav-link {
    font-size: 0.5rem;
    bottom: 1rem;
  }
  .nav-link.left { left: 0.8rem; }
  .nav-link.right { right: 0.8rem; }
  #hint {
    font-size: 0.4rem;
    top: 1rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  #hint {
    animation: none;
    opacity: 0.5;
  }
}
</style>
</head>
<body onclick="hideHint(); history.go(0);">
<div id="hint">↻ CLICK TO REROLL</div>
<div class="flex" id="flex"></div>
<a class="nav-link left" href="index.html" onclick="event.stopPropagation();">← RETURN</a>
<a class="nav-link right" href="#" onclick="event.stopPropagation(); hideHint(); history.go(0); return false;">REROLL ↻</a>
<script src="files/like.js"></script>
<script>
function randomize() {
  var alternative = alternatives[Math.floor(Math.random() * alternatives.length)];
  document.getElementById("flex").innerHTML = "I LIKE " + alternative;
  document.title = "I LIKE " + alternative;
}
function hideHint() {
  var hint = document.getElementById("hint");
  if (hint && !hint.className) {
    hint.className = "hidden";
  }
}
randomize();
</script>
</body>
</html>
