<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CACOPHONY</title>
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="description" content="A creation myth, narrated from the noise — chaos pulled into a world, and the question that outlasts it.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Spectral:ital@1&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  background: #050310;
  color: #f3f0ea;
  font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  overflow: hidden;
}

/* the cosmos — full-bleed canvas behind everything */
#cosmos {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  display: block;
}

/* the stage holds the word and the controls, centered over the cosmos */
#stage {
  position: fixed;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  padding: 6vw;
  text-align: center;
}

/* the mythic text — coalesces out of nothing, holds, dissolves back */
#word {
  position: relative;
  max-width: 760px;
  opacity: 0;
  filter: blur(16px);
  transform: translateY(10px);
  transition: opacity 1.3s ease, filter 1.3s ease, transform 1.3s ease;
  will-change: opacity, filter, transform;
}

/* a soft scrim bonded to the text — guarantees contrast against the
   white-hot core without ever reading as a box. fades with the word. */
#word::before {
  content: "";
  position: absolute;
  inset: -1.6em -1.8em -1.2em;
  z-index: -1;
  background: radial-gradient(ellipse at center,
    rgba(5, 3, 16, 0.82) 0%,
    rgba(5, 3, 16, 0.6) 40%,
    rgba(5, 3, 16, 0) 74%);
  pointer-events: none;
}

#word.show {
  opacity: 1;
  filter: blur(0);
  transform: none;
}

#word .line {
  font-size: clamp(1.5rem, 4.4vw, 3rem);
  font-weight: 500;
  line-height: 1.4;
  letter-spacing: 0.01em;
  text-shadow:
    0 0 4px rgba(5, 3, 16, 0.95),
    0 2px 22px rgba(0, 0, 0, 0.92),
    0 0 50px rgba(0, 0, 0, 0.7);
}

#word .note {
  display: block;
  margin-top: 1.4em;
  font-family: 'Spectral', Georgia, serif;
  font-style: italic;
  font-size: clamp(0.78rem, 1.8vw, 1.05rem);
  letter-spacing: 0.16em;
  color: rgba(243, 240, 234, 0.45);
  text-shadow: 0 1px 14px rgba(0, 0, 0, 0.9);
}

/* the threshold — the only thing the user can touch */
#enter {
  pointer-events: auto;
  position: relative;
  background: transparent;
  border: 1px solid rgba(255, 30, 54, 0.7);
  color: #ff5566;
  font-family: 'Spectral', Georgia, serif;
  font-style: italic;
  font-size: clamp(1.1rem, 2.6vw, 1.5rem);
  letter-spacing: 0.34em;
  padding: 0.85em 2.6em 0.85em 2.9em;
  cursor: pointer;
  transition: color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease, letter-spacing 0.5s ease;
}

#enter:hover {
  color: #fff;
  border-color: #ff1e36;
  box-shadow: 0 0 38px rgba(255, 30, 54, 0.4), inset 0 0 22px rgba(255, 30, 54, 0.12);
  letter-spacing: 0.42em;
}

#enter:focus-visible {
  outline: 1px solid #ff5566;
  outline-offset: 6px;
}

#enter.gone {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.08);
  transition: opacity 1.1s ease, transform 1.1s ease;
}

#enter-caption {
  pointer-events: none;
  margin-top: 1.6em;
  font-family: 'Spectral', Georgia, serif;
  font-style: italic;
  font-size: clamp(0.8rem, 1.8vw, 1rem);
  letter-spacing: 0.18em;
  color: rgba(243, 240, 234, 0.32);
  transition: opacity 0.8s ease;
}

#enter-caption.gone {
  opacity: 0;
}

#back-link {
  pointer-events: auto;
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  color: rgba(243, 240, 234, 0.32);
  text-decoration: none;
  font-family: 'Spectral', Georgia, serif;
  font-style: italic;
  font-size: 0.95rem;
  letter-spacing: 0.18em;
  transition: color 0.4s ease;
}

#back-link:hover {
  color: #ff5566;
}

@media (prefers-reduced-motion: reduce) {
  #word { transition: opacity 0.6s ease; filter: none; transform: none; }
  #word.show { filter: none; transform: none; }
}
</style>
</head>
<body>
  <canvas id="cosmos"></canvas>

  <div id="stage">
    <div id="word" aria-live="polite"></div>
    <button id="enter">begin</button>
    <div id="enter-caption">there is noise before there is a world</div>
  </div>

  <a id="back-link" href="index.html">return</a>

  <script>
  (function () {
    "use strict";

    /* ----------------------------------------------------------------------
       THE SCORE
       Eight verbatim fragments from published creation literature, sequenced
       to mirror the arc of the narration: the void, the deep, the first
       stirring, the beasts of the abyss, the creative word, the severing,
       the world made from the remains, and the question that outlasts the
       answer. Four traditions: the Ṛgveda (Vedic), Genesis (Hebrew), the
       Enūma Eliš (Babylonian — the Marduk/Tiāmat conflict at the center),
       and the Poetic Edda (Norse). Sources noted in each `note`.

       `t` is the moment (in seconds) each fragment surfaces. The audio is
       ~42s; nudge these to taste once you hear it against the visuals.
       `core` / `accent` set the cosmos palette; `heat` drives ignition
       (rays, shockwaves, warmth) and is lerped between movements.
    ---------------------------------------------------------------------- */
    var SCORE = [
      { t: 0.0,  line: "Then was not non-existent nor existent: there was no realm of air, no sky beyond it.",
                 note: "Ṛgveda 10.129.1 · tr. Griffith",
                 core: "#20204e", accent: "#5566cc", heat: 0.05 },
      { t: 5.5,  line: "The earth was without form, and void; and darkness was upon the face of the deep.",
                 note: "Genesis 1:2 · King James Version",
                 core: "#28205a", accent: "#4a5fd0", heat: 0.10 },
      { t: 11.0, line: "Thereafter rose Desire in the beginning, Desire, the primal seed and germ of Spirit.",
                 note: "Ṛgveda 10.129.4 · tr. Griffith",
                 core: "#3a2a72", accent: "#6f7ad6", heat: 0.18 },
      { t: 16.0, line: "She spawned monster-serpents, sharp of tooth and merciless of fang; with poison instead of blood she filled their bodies.",
                 note: "Enūma Eliš I · tr. L. W. King — of Tiāmat",
                 core: "#2f3a84", accent: "#46c6e0", heat: 0.32 },
      { t: 21.5, line: "He spake with his mouth, and the garment vanished; again he commanded it, and the garment reappeared.",
                 note: "Enūma Eliš IV · tr. L. W. King — the proving of the word",
                 core: "#b23a2a", accent: "#ffcc55", heat: 0.85 },
      { t: 27.0, line: "He split her up like a flat fish into two halves; one half of her he stablished as a covering for heaven.",
                 note: "Enūma Eliš IV.137 · tr. L. W. King",
                 core: "#ff1e36", accent: "#ffffff", heat: 1.0 },
      { t: 32.5, line: "Out of Ymir's flesh was fashioned the earth, and the ocean out of his blood; of his bones the hills, of his skull the heavens high.",
                 note: "Grímnismál 40 · Poetic Edda, tr. Bellows",
                 core: "#d9a24a", accent: "#ffe9b0", heat: 0.80 },
      { t: 38.0, line: "Whence all creation had its origin, he, whether he fashioned it or whether he did not — he knows, or maybe even he does not know.",
                 note: "Ṛgveda 10.129.7 · tr. Griffith",
                 core: "#2c2c66", accent: "#5a78d0", heat: 0.25 }
    ];

    var FALLBACK_DURATION = 42;

    /* ---------------------------------------------------------------- setup */
    var canvas = document.getElementById('cosmos');
    var ctx = canvas.getContext('2d');
    var stage = document.getElementById('word');
    var enterBtn = document.getElementById('enter');
    var enterCaption = document.getElementById('enter-caption');

    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var W = 0, H = 0, DPR = 1, R = 0, CX = 0, CY = 0;

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      R = Math.min(W, H);
      CX = W / 2;
      CY = H / 2;
      seedStars();
    }
    window.addEventListener('resize', resize);

    /* --------------------------------------------------------- the starfield */
    var stars = [];
    function seedStars() {
      var target = reduceMotion ? 120 : Math.min(420, Math.floor((W * H) / 3600));
      stars = [];
      for (var i = 0; i < target; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          z: 0.3 + Math.random() * 0.7,          // parallax / size
          b: 0.2 + Math.random() * 0.8,          // base brightness
          tw: Math.random() * Math.PI * 2,       // twinkle phase
          drift: (Math.random() - 0.5) * 0.12    // slow horizontal drift
        });
      }
    }

    /* ----------------------------------------------------------- audio graph */
    var audioCtx, analyser, audio, freqData, timeData;
    var BINS = 256;
    var smooth = new Float32Array(BINS);
    var started = false;
    var rafId = null;
    var startClock = 0;

    function setupAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.82;
      freqData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);

      audio = new Audio('files/CACOPHONY.mp3');
      audio.crossOrigin = 'anonymous';
      var src = audioCtx.createMediaElementSource(audio);
      src.connect(analyser);
      analyser.connect(audioCtx.destination);

      audio.addEventListener('ended', onEnded);
    }

    /* ----------------------------------------------------------- color tools */
    function hexToRgb(h) {
      h = h.replace('#', '');
      return [parseInt(h.substr(0, 2), 16), parseInt(h.substr(2, 2), 16), parseInt(h.substr(4, 2), 16)];
    }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function mixRgb(a, b, t) {
      return [Math.round(lerp(a[0], b[0], t)), Math.round(lerp(a[1], b[1], t)), Math.round(lerp(a[2], b[2], t))];
    }
    function rgba(c, a) { return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')'; }

    // precompute rgb for each movement
    SCORE.forEach(function (m) { m._core = hexToRgb(m.core); m._accent = hexToRgb(m.accent); });

    // interpolate palette + heat for a given time
    function paletteAt(time) {
      var i = 0;
      for (var k = 0; k < SCORE.length; k++) { if (SCORE[k].t <= time) i = k; }
      var a = SCORE[i];
      var b = SCORE[Math.min(i + 1, SCORE.length - 1)];
      var span = (b.t - a.t) || 1;
      var p = Math.max(0, Math.min(1, (time - a.t) / span));
      // ease
      p = p * p * (3 - 2 * p);
      return {
        core: mixRgb(a._core, b._core, p),
        accent: mixRgb(a._accent, b._accent, p),
        heat: lerp(a.heat, b.heat, p)
      };
    }

    /* ------------------------------------------------------- the text driver */
    var currentIndex = -1;
    var swapToken = 0;

    function showMovement(idx) {
      var m = SCORE[idx];
      var token = ++swapToken;
      stage.classList.remove('show');
      var delay = currentIndex === -1 ? 50 : 1300;  // first one needn't fade out
      setTimeout(function () {
        if (token !== swapToken) return;
        stage.innerHTML = '<span class="line">' + m.line + '</span><span class="note">' + m.note + '</span>';
        // force reflow so the transition fires
        void stage.offsetWidth;
        stage.classList.add('show');
      }, delay);
      currentIndex = idx;
    }

    function updateText(time) {
      var idx = 0;
      for (var k = 0; k < SCORE.length; k++) { if (SCORE[k].t <= time) idx = k; }
      if (idx !== currentIndex) showMovement(idx);
    }

    /* ----------------------------------------------------------- shockwaves  */
    var waves = [];
    var bassAvg = 0;
    var lastWave = 0;

    /* ----------------------------------------------------- geometry helpers  */
    // draw a smooth closed loop through points (Catmull-Rom -> bezier)
    function closedCurve(pts) {
      var n = pts.length;
      ctx.beginPath();
      ctx.moveTo((pts[n - 1].x + pts[0].x) / 2, (pts[n - 1].y + pts[0].y) / 2);
      for (var i = 0; i < n; i++) {
        var p1 = pts[i];
        var p2 = pts[(i + 1) % n];
        ctx.quadraticCurveTo(p1.x, p1.y, (p1.x + p2.x) / 2, (p1.y + p2.y) / 2);
      }
      ctx.closePath();
    }

    /* --------------------------------------------------------- the render  */
    var rot = 0;

    function frame() {
      rafId = requestAnimationFrame(frame);

      var time = audio ? audio.currentTime : 0;
      var pal = paletteAt(time);

      // pull audio data
      analyser.getByteFrequencyData(freqData);
      analyser.getByteTimeDomainData(timeData);
      for (var i = 0; i < BINS; i++) {
        smooth[i] += (freqData[i] - smooth[i]) * 0.2;
      }

      // metrics
      var bass = avg(smooth, 1, 8) / 255;
      var treble = avg(smooth, 48, 160) / 255;
      var overall = avg(smooth, 1, 160) / 255;

      // creation progresses: the universe populates as the myth proceeds
      var dur = (audio && audio.duration && isFinite(audio.duration)) ? audio.duration : FALLBACK_DURATION;
      var progress = Math.max(0, Math.min(1, time / dur));
      var birth = 0.25 + 0.75 * progress;   // global brightness ramp

      if (!reduceMotion) rot += 0.0009 + treble * 0.0016;

      // ---- fade the previous frame (trails) ----
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(5, 3, 16, ' + (reduceMotion ? 0.4 : 0.16) + ')';
      ctx.fillRect(0, 0, W, H);

      // everything luminous adds
      ctx.globalCompositeOperation = 'lighter';

      // ---- starfield ----
      drawStars(overall, birth);

      var coreR = R * 0.085 * (1 + bass * 0.7);
      var maxCorona = R * 0.16;

      // ---- frequency aurora (mirrored, smooth, organic) ----
      drawAurora(coreR, maxCorona, pal, birth);

      // ---- oscilloscope ring (the voice, vibrating) ----
      drawOscRing(coreR * 1.55, R * 0.04 * (0.6 + overall), pal, birth);

      // ---- ignition rays (intensify with heat at the climax) ----
      if (!reduceMotion && pal.heat > 0.18) drawRays(coreR, maxCorona, treble, pal, birth);

      // ---- the core (the origin point, breathing) ----
      drawCore(coreR, pal, birth);

      // ---- shockwaves on bass transients ----
      updateWaves(bass, coreR, pal, time);

      // ---- text ----
      updateText(time);
    }

    function avg(arr, lo, hi) {
      var s = 0, n = 0;
      for (var i = lo; i < hi; i++) { s += arr[i]; n++; }
      return n ? s / n : 0;
    }

    function drawStars(overall, birth) {
      var flare = 1 + overall * 1.6;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        if (!reduceMotion) {
          s.x += s.drift * s.z;
          if (s.x < 0) s.x += W; else if (s.x > W) s.x -= W;
          s.tw += 0.02 + s.z * 0.02;
        }
        var twinkle = reduceMotion ? 1 : (0.6 + 0.4 * Math.sin(s.tw));
        var a = s.b * twinkle * birth * 0.9;
        var rad = s.z * 1.4 * flare;
        ctx.fillStyle = 'rgba(' + 200 + ',' + 215 + ',255,' + (a * 0.5) + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, rad * 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, rad * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawAurora(coreR, maxCorona, pal, birth) {
      var N = 140;
      var half = N / 2;
      var pts = [];
      for (var i = 0; i < N; i++) {
        var ang = (i / N) * Math.PI * 2 + rot;
        var idx = i < half ? i : N - i;             // mirror for symmetry
        var bin = Math.floor((idx / half) * (BINS - 1));
        var mag = smooth[bin] / 255;
        var rr = coreR + mag * maxCorona * (0.5 + 0.7 * pal.heat) + R * 0.012;
        pts.push({ x: CX + Math.cos(ang) * rr, y: CY + Math.sin(ang) * rr });
      }
      // soft filled body
      var g = ctx.createRadialGradient(CX, CY, coreR * 0.4, CX, CY, coreR + maxCorona);
      g.addColorStop(0, rgba(pal.accent, 0.0));
      g.addColorStop(0.6, rgba(pal.accent, 0.10 * birth));
      g.addColorStop(1, rgba(pal.core, 0.0));
      closedCurve(pts);
      ctx.fillStyle = g;
      ctx.fill();
      // luminous edge
      closedCurve(pts);
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = rgba(pal.accent, 0.5 * birth);
      ctx.stroke();
    }

    function drawOscRing(radius, amp, pal, birth) {
      var M = 160;
      var pts = [];
      for (var i = 0; i < M; i++) {
        var ang = (i / M) * Math.PI * 2 - rot * 0.6;
        var t = timeData[Math.floor((i / M) * timeData.length)] / 128 - 1; // -1..1
        var rr = radius + t * amp;
        pts.push({ x: CX + Math.cos(ang) * rr, y: CY + Math.sin(ang) * rr });
      }
      closedCurve(pts);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = rgba(mixRgb(pal.accent, [255, 255, 255], 0.4), 0.42 * birth);
      ctx.stroke();
    }

    function drawRays(coreR, maxCorona, treble, pal, birth) {
      var K = 28;
      var len = coreR + (0.4 + treble) * maxCorona * 2.4 * pal.heat;
      ctx.lineWidth = 1.1;
      for (var k = 0; k < K; k++) {
        var ang = (k / K) * Math.PI * 2 + rot * 1.4;
        var x0 = CX + Math.cos(ang) * coreR;
        var y0 = CY + Math.sin(ang) * coreR;
        var x1 = CX + Math.cos(ang) * len;
        var y1 = CY + Math.sin(ang) * len;
        ctx.strokeStyle = rgba(pal.accent, 0.12 * pal.heat * birth);
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();
      }
    }

    function drawCore(coreR, pal, birth) {
      var g = ctx.createRadialGradient(CX, CY, 0, CX, CY, coreR * 1.8);
      var white = mixRgb(pal.accent, [255, 255, 255], 0.7);
      g.addColorStop(0, rgba(white, 0.55 * birth));
      g.addColorStop(0.35, rgba(pal.accent, 0.40 * birth));
      g.addColorStop(0.7, rgba(pal.core, 0.22 * birth));
      g.addColorStop(1, rgba(pal.core, 0));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(CX, CY, coreR * 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

    function updateWaves(bass, coreR, pal, time) {
      bassAvg = bassAvg * 0.92 + bass * 0.08;
      if (!reduceMotion && bass > 0.26 && bass > bassAvg * 1.45 && time - lastWave > 0.18) {
        waves.push({ r: coreR, a: 0.45 * (0.4 + pal.heat) });
        lastWave = time;
      }
      ctx.lineWidth = 1.4;
      for (var i = waves.length - 1; i >= 0; i--) {
        var w = waves[i];
        w.r += R * 0.011;
        w.a *= 0.945;
        if (w.a < 0.02) { waves.splice(i, 1); continue; }
        ctx.strokeStyle = rgba(pal.accent, w.a);
        ctx.beginPath();
        ctx.arc(CX, CY, w.r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    /* ----------------------------------------------------------- lifecycle  */
    function begin() {
      if (!audioCtx) setupAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      enterBtn.classList.add('gone');
      enterCaption.classList.add('gone');

      audio.currentTime = 0;
      currentIndex = -1;
      waves = [];
      bassAvg = 0;
      lastWave = 0;
      var p = audio.play();
      if (p && p.catch) p.catch(function () {});

      startClock = performance.now();
      if (!started) {
        started = true;
        frame();
      }
    }

    function onEnded() {
      // let the last fragment hold a moment, then offer the return
      setTimeout(function () {
        stage.classList.remove('show');
      }, 2600);
      setTimeout(function () {
        enterBtn.textContent = 'again';
        enterBtn.classList.remove('gone');
      }, 4200);
    }

    enterBtn.addEventListener('click', begin);

    resize();

    // a faint idle cosmos before the user begins, so the page isn't dead
    (function idle() {
      if (started) return;
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(5, 3, 16, 0.25)';
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';
      drawStars(0, 0.5);
      if (!started) requestAnimationFrame(idle);
    })();
  })();
  </script>
</body>
</html>
