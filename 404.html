<!DOCTYPE html>
<!--
  404 — channel not found.
  The lost page bounces across a CRT, like the DVD logo that never
  quite hits the corner. Except sometimes it does. Catch it to leave.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 · NO SIGNAL</title>
<meta name="description" content="Channel 404. No signal. The page you wanted bounced away.">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  background: #000;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
}

/* ====================== the tube ====================== */
#screen {
  position: fixed;
  inset: 0;
  border-radius: 1.4rem;
  background:
    radial-gradient(ellipse at 50% 40%, #101418 0%, #07090b 70%, #030405 100%);
  overflow: hidden;
}

/* ====================== the bouncing logo ====================== */
#logo {
  position: absolute;
  top: 0;
  left: 0;
  display: inline-block;
  color: #73B036;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
  will-change: transform;
  z-index: 2;
}

#logo .num {
  display: block;
  font-size: clamp(3rem, 16vw, 8rem);
  line-height: 1;
  text-shadow:
    2px 0 rgba(255, 40, 80, 0.45),
    -2px 0 rgba(0, 255, 255, 0.40),
    0 0 0.35em currentColor,
    0 0 1.1em currentColor;
}

#logo .oval {
  display: block;
  margin: 0.55em auto 0;
  width: fit-content;
  border: 0.16em solid currentColor;
  border-radius: 50%;
  padding: 0.46em 1.1em 0.38em;
  font-size: clamp(0.5rem, 2.2vw, 0.95rem);
  letter-spacing: 0.3em;
  text-indent: 0.3em;
  text-shadow:
    1px 0 rgba(255, 40, 80, 0.4),
    -1px 0 rgba(0, 255, 255, 0.35),
    0 0 0.5em currentColor;
  box-shadow: 0 0 0.8em -0.15em currentColor, inset 0 0 0.6em -0.2em currentColor;
}

/* centered fallback while JS hasn't run (and for reduced motion) */
#logo.centered {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -56%);
}

/* ====================== OSD chrome ====================== */
.osd {
  position: absolute;
  z-index: 3;
  font-size: clamp(0.5rem, 1.6vw, 0.75rem);
  color: #4dff4d;
  text-shadow: 0 0 6px rgba(77, 255, 77, 0.8), 1px 0 rgba(255, 0, 0, 0.25), -1px 0 rgba(0, 255, 255, 0.25);
  letter-spacing: 0.12em;
  user-select: none;
}

#osd-ch    { top: 1.4rem; left: 1.6rem; }
#osd-stats { top: 1.4rem; right: 1.6rem; text-align: right; }

#osd-return {
  bottom: 1.6rem;
  left: 50%;
  transform: translateX(-50%);
  text-decoration: none;
  white-space: nowrap;
}
#osd-return:hover { color: #b6ffb6; text-shadow: 0 0 10px rgba(77, 255, 77, 1); }
#osd-hint {
  bottom: 3.4rem;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(77, 255, 77, 0.45);
  text-shadow: none;
  font-size: clamp(0.4rem, 1.2vw, 0.55rem);
  white-space: nowrap;
}

/* corner celebration */
#toast {
  position: absolute;
  z-index: 4;
  top: 24%;
  left: 50%;
  transform: translateX(-50%) scale(0.6);
  font-size: clamp(0.8rem, 3.4vw, 1.6rem);
  color: #fff;
  text-shadow: 0 0 0.5em #fff, 2px 0 rgba(255, 40, 80, 0.8), -2px 0 rgba(0, 255, 255, 0.8);
  letter-spacing: 0.3em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) scale(1); }

#flash {
  position: absolute;
  inset: 0;
  z-index: 4;
  background: #fff;
  opacity: 0;
  pointer-events: none;
}
#flash.pop { animation: pop 0.55s ease-out; }
@keyframes pop {
  0% { opacity: 0.55; }
  100% { opacity: 0; }
}

/* ====================== CRT filter stack ====================== */
#crt {
  position: fixed;
  inset: 0;
  border-radius: 1.4rem;
  pointer-events: none;
  z-index: 5;
  overflow: hidden;
}

/* aperture grille: faint vertical RGB phosphor stripes */
#crt::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(90deg,
    rgba(255, 0, 0, 0.045) 0px, rgba(255, 0, 0, 0.045) 1px,
    rgba(0, 255, 0, 0.035) 1px, rgba(0, 255, 0, 0.035) 2px,
    rgba(0, 60, 255, 0.045) 2px, rgba(0, 60, 255, 0.045) 3px);
}

/* scanlines */
#crt::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg,
    rgba(0, 0, 0, 0.22) 0px, rgba(0, 0, 0, 0.22) 1px,
    transparent 1px, transparent 3px);
}

/* slow rolling band */
#roll {
  position: absolute;
  left: 0;
  right: 0;
  top: -18vmin;
  height: 16vmin;
  background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.04), transparent);
  animation: roll 8s linear infinite;
}
@keyframes roll {
  from { top: -18vmin; }
  to   { top: 104%; }
}

/* curvature: vignette + corner darkening + glass glint up top */
#vignette {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% -12%, rgba(255, 255, 255, 0.05), transparent 38%),
    radial-gradient(ellipse at 50% 50%, transparent 58%, rgba(0, 0, 0, 0.38) 88%, rgba(0, 0, 0, 0.78) 100%);
  box-shadow: inset 0 0 14vmin rgba(0, 0, 0, 0.85);
  border-radius: 1.4rem;
}

/* mains-hum flicker */
#flicker {
  position: absolute;
  inset: 0;
  background: #fff;
  opacity: 0.015;
  animation: flick 3.1s linear infinite;
}
@keyframes flick {
  0%, 100% { opacity: 0.012; }
  31% { opacity: 0.022; }
  32% { opacity: 0.006; }
  33% { opacity: 0.018; }
  64% { opacity: 0.028; }
  65% { opacity: 0.008; }
  66% { opacity: 0.016; }
}

/* ====================== power-on ====================== */
#boot {
  position: fixed;
  inset: 0;
  z-index: 6;
  background: #fff;
  pointer-events: none;
  transform-origin: 50% 50%;
  animation: crt-on 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}
@keyframes crt-on {
  0%   { transform: scale(0, 0.004); opacity: 1; }
  35%  { transform: scale(1, 0.004); opacity: 1; }
  70%  { transform: scale(1, 1); opacity: 0.65; }
  100% { transform: scale(1, 1); opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  #boot, #roll, #flicker { animation: none; opacity: 0; }
  #flash.pop { animation: none; }
  #toast { transition: opacity 0.3s ease; }
}
</style>
</head>
<body>
  <div id="screen">
    <a id="logo" class="centered" href="/">
      <span class="num">404</span>
      <span class="oval">NOT&nbsp;FOUND</span>
    </a>
    <div class="osd" id="osd-ch">AV-404</div>
    <div class="osd" id="osd-stats"></div>
    <div class="osd" id="osd-hint">catch it — or take the door</div>
    <a class="osd" id="osd-return" href="/">[ ‹‹ RETURN TO INDEX ]</a>
    <div id="toast">✦ CORNER ✦</div>
    <div id="flash"></div>
  </div>

  <div id="crt">
    <div id="roll"></div>
    <div id="vignette"></div>
    <div id="flicker"></div>
  </div>
  <div id="boot"></div>

<script>
(function () {
  'use strict';

  var reduceMotion = window.matchMedia &&
    window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var logo = document.getElementById('logo');
  var stats = document.getElementById('osd-stats');
  var toast = document.getElementById('toast');
  var flash = document.getElementById('flash');

  /* the site's own palette — every bounce borrows another page's color */
  var COLORS = ['#73B036', '#FF1E36', '#E4A71E', '#4169E1', '#46C6E0', '#9C5BFF', '#F3F0EA'];
  var color = COLORS[0];

  var bounces = 0;
  var corners = 0;
  try { corners = parseInt(localStorage.getItem('corners_404') || '0', 10) || 0; } catch (e) {}

  function pad(n) { return String(Math.min(n, 9999)).padStart(4, '0'); }
  function updateStats() {
    stats.textContent = 'BOUNCE ' + pad(bounces) + '  CORNER ' + pad(corners);
  }
  updateStats();

  if (reduceMotion) return; // logo stays centered; chrome stays calm

  var W, H, lw, lh;
  var x = 0, y = 0, vx = 0, vy = 0;

  function measure() {
    W = window.innerWidth;
    H = window.innerHeight;
    var r = logo.getBoundingClientRect();
    lw = r.width;
    lh = r.height;
    x = Math.min(Math.max(x, 0), Math.max(0, W - lw));
    y = Math.min(Math.max(y, 0), Math.max(0, H - lh));
  }

  function setColor() {
    var next;
    do { next = COLORS[Math.floor(Math.random() * COLORS.length)]; } while (next === color);
    color = next;
    logo.style.color = color;
  }

  function cornerHit() {
    corners++;
    try { localStorage.setItem('corners_404', String(corners)); } catch (e) {}
    flash.classList.remove('pop');
    void flash.offsetWidth; /* restart the animation */
    flash.classList.add('pop');
    toast.classList.add('show');
    setTimeout(function () { toast.classList.remove('show'); }, 2200);
  }

  var last = 0;
  function tick(t) {
    requestAnimationFrame(tick);
    var dt = Math.min(0.05, (t - last) / 1000) || 0;
    last = t;

    x += vx * dt;
    y += vy * dt;

    var hits = 0;
    if (x <= 0) { x = 0; vx = Math.abs(vx); hits++; }
    else if (x + lw >= W) { x = W - lw; vx = -Math.abs(vx); hits++; }
    if (y <= 0) { y = 0; vy = Math.abs(vy); hits++; }
    else if (y + lh >= H) { y = H - lh; vy = -Math.abs(vy); hits++; }

    if (hits > 0) {
      bounces += hits;
      setColor();
      if (hits === 2) cornerHit();
      updateStats();
    }

    logo.style.transform = 'translate(' + x + 'px,' + y + 'px)';
  }

  function start() {
    logo.classList.remove('centered');
    measure();
    /* 3-4-5 ratio: never a perfect diagonal, so corners stay rare and earned */
    var speed = Math.max(120, Math.min(260, W * 0.12));
    vx = speed * 0.8 * (Math.random() < 0.5 ? 1 : -1);
    vy = speed * 0.6 * (Math.random() < 0.5 ? 1 : -1);
    x = Math.random() * Math.max(1, W - lw);
    y = Math.random() * Math.max(1, H - lh);
    logo.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    requestAnimationFrame(function (t) { last = t; requestAnimationFrame(tick); });
  }

  var rT;
  window.addEventListener('resize', function () {
    clearTimeout(rT);
    rT = setTimeout(measure, 120);
  });

  /* wait for the pixel font so the logo is measured at its real size */
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(start);
  } else {
    setTimeout(start, 300);
  }
})();
</script>
</body>
</html>
